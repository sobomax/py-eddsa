name: Build, Test & Publish Python

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  build_test_python:
    name: Build & Test Python
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14-dev"]
        compiler: [gcc, clang]
        include:
          - os: macos
            python-version: "3.11"
            compiler: clang
          - os: macos
            python-version: "3.12"
            compiler: clang
          - os: macos
            python-version: "3.13"
            compiler: clang
          - os: macos
            python-version: "3.14-dev"
            compiler: clang
          - os: windows
            python-version: "3.11"
            compiler: msvc
          - os: windows
            python-version: "3.12"
            compiler: msvc
          - os: windows
            python-version: "3.13"
            compiler: msvc
          - os: windows
            python-version: "3.14-dev"
            compiler: msvc

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build setuptools wheel
        shell: bash

      - name: Build package
        if: matrix.compiler != 'msvc'
        run: CC=${{ matrix.compiler }} python -m build --sdist --wheel --outdir dist python
        shell: bash

      - name: Build package
        if: matrix.compiler == 'msvc'
        run: python -m build --sdist --wheel --outdir dist python
        shell: bash

      - name: Install package
        run: python -m pip install dist/*.whl
        shell: bash

      - name: Run Python tests
        run: python -m unittest discover -s python/tests -p 'test_*.py'
        shell: bash

      - name: Run C tests
        if: matrix.os != 'windows'
        run: python python/setup.py runctest
        shell: bash

      - name: Run benchmark
        run: |
          WHEEL_FILE="$(ls dist/*.whl | head -n 1)"
          WHEEL_NAME="$(basename "${WHEEL_FILE}")"
          python python/tools/benchmark.py \
            --json "benchmark-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.python-version }}.json" \
            --target "${{ matrix.os }}" \
            --compiler "${{ matrix.compiler }}" \
            --wheel "${WHEEL_NAME}"
        shell: bash

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.python-version }}
          path: benchmark-*.json

  benchmark_summary:
    name: Benchmark Summary
    needs: build_test_python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download benchmark results
        uses: actions/download-artifact@v8
        with:
          path: benchmark-results
          pattern: benchmark-*
          merge-multiple: true

      - name: Summarize benchmarks
        run: |
          python python/tools/benchmark_summary.py 'benchmark-results/*.json' --output benchmark-summary.md
          cat benchmark-summary.md >> "${GITHUB_STEP_SUMMARY}"
        shell: bash

  build_wheels:
    name: Build Wheels
    needs: build_test_python
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel python --output-dir dist
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_TEST_COMMAND: "python -c \"import eddsa; sec=bytes(range(32)); pub=eddsa.ed25519_genpub(sec); sig=eddsa.ed25519_sign(sec, pub, b'test'); assert eddsa.ed25519_verify(sig, pub, b'test')\""

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: dist/*.whl

  publish_all_wheels:
    name: Publish Python Distributions
    runs-on: ubuntu-latest
    needs: build_wheels
    environment:
      name: pypi
      url: https://pypi.org/p/py-eddsa
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build setuptools wheel

      - name: Build sdist
        run: python -m build --sdist --outdir dist python

      - name: Check release version number
        if: github.event_name == 'release' && github.event.action == 'published'
        run: |
          GIT_REF="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          GIT_REF="${GIT_REF#refs/tags/}"
          python python/setup.py checkversion --tag="${GIT_REF}"

      - name: Publish package distributions to PyPI
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: pypa/gh-action-pypi-publish@release/v1

  roll_release:
    name: Release
    needs: publish_all_wheels
    permissions:
      contents: write
    uses: sippy/cimagic/.github/workflows/RollReleaseDraft.yml@v2
